<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokemon Deck Builder</title>

<link rel="stylesheet" href="styles.css">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"/>

</head>

<body>

<header>
<h1>🧩 Pokemon Deck Builder</h1>

<button id="theme-toggle">🌙 Theme</button>
<button id="show-favorites">⭐ Favorites</button>

</header>

<main>

<section class="team-builder">
<h2>Team Builder (Max 6)</h2>
<div id="team-slots" class="team-slots"></div>
</section>

<section class="controls">
<input type="text" id="search" placeholder="Search Pokemon...">

<select id="sort">
<option value="id-asc">ID Asc</option>
<option value="id-desc">ID Desc</option>
<option value="name-asc">Name A-Z</option>
<option value="name-desc">Name Z-A</option>
</select>

<select id="type-filter">
<option value="">All Types</option>
<option value="fire">Fire</option>
<option value="water">Water</option>
<option value="grass">Grass</option>
<option value="electric">Electric</option>
</select>

<div>
<span id="pokemon-count">0</span> Pokémon Loaded
</div>

</section>

<section class="pokemon-grid" id="pokemon-container"></section>

<!-- Battle Arena -->
<div class="battle-arena" id="battle-arena">
<div class="battle-box">
<div class="battle-field">

<div class="fighter" id="fighter1"></div>
<div class="vs">VS</div>
<div class="fighter" id="fighter2"></div>

</div>

<button id="close-battle">Close Battle</button>
</div>
</div>

</main>

<footer>
Data powered by <a href="https://pokeapi.co/">PokeAPI</a>
</footer>

<script src="script.js"></script>

</body>
</html>
