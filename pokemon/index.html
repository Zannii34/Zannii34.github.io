<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokemon Deck Builder</title>
<link rel="stylesheet" href="styles.css">
<!-- Font Awesome Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
</head>
<div id="swipe-tutorial" class="swipe-tutorial">
    <div class="tutorial-box">
        <h2>📱 Swipe Pokémon Cards</h2>
        <p>
            👉 Swipe Right = ⭐ Favorite Pokémon  
        </p>
        <p>
            👈 Swipe Left = Remove Card  
        </p>
        <p>
            🃏 Tap Card = Flip Details  
        </p>
        <button id="close-tutorial">Got it!</button>
    </div>
</div>
<body>

<header>
    <h1>
        <i class="fas fa-dice-d20"></i>
        Pokemon Deck Builder
    </h1>
    <button id="theme-toggle">🌙 Toggle Theme</button>
    <button id="show-favorites">⭐ Favorites</button>
</header>

<main>

<section class="controls">

    <div class="filter-sort">

        <div class="sort-control">
            <label>Sort By</label>
            <select id="sort">
                <option value="id-asc">ID Ascending</option>
                <option value="id-desc">ID Descending</option>
                <option value="name-asc">Name (A-Z)</option>
                <option value="name-desc">Name (Z-A)</option>
            </select>
        </div>

        <div class="search-control">
            <label>Search Pokemon</label>
            <input type="text" id="search" placeholder="Search by name or ID..." />
        </div>

    </div>

    <!-- Type Filter -->
    <div style="margin-top:15px;">
        <select id="type-filter">
            <option value="">Filter by Type...</option>
            <option value="normal">Normal</option>
            <option value="fire">Fire</option>
            <option value="water">Water</option>
            <option value="electric">Electric</option>
            <option value="grass">Grass</option>
            <option value="ice">Ice</option>
            <option value="fighting">Fighting</option>
            <option value="poison">Poison</option>
            <option value="ground">Ground</option>
            <option value="flying">Flying</option>
            <option value="psychic">Psychic</option>
            <option value="bug">Bug</option>
            <option value="rock">Rock</option>
            <option value="ghost">Ghost</option>
            <option value="dragon">Dragon</option>
            <option value="dark">Dark</option>
            <option value="steel">Steel</option>
            <option value="fairy">Fairy</option>
        </select>
    </div>

    <div class="stats">
        <span id="pokemon-count">0</span> Pokemon loaded
    </div>

</section>

<!-- Pokemon Grid -->
<section class="pokemon-grid" id="pokemon-container">
</section>

<!-- Modal for Pokémon Details -->
<div class="modal" id="pokemon-modal">
    <div class="modal-content" id="modal-body">
        <button id="close-modal">Close ✖</button>
        <!-- Pokémon details populated by JS -->
    </div>
</div>

<!-- Battle Arena -->
<div class="battle-arena" id="battle-arena">
    <div class="battle-box">
        <div class="battle-field">
            <div class="fighter" id="fighter1"></div>
            <div class="vs">VS</div>
            <div class="fighter" id="fighter2"></div>
        </div>
        <button id="close-battle">Close Battle ✖</button>
    </div>
</div>

</main>

<footer>
    <p>
        Data powered by <a href="https://pokeapi.co/" target="_blank">PokeAPI</a>
    </p>
</footer>

<script src="script.js"></script>

</body>
</html>
